apiVersion: batch/v1
kind: CronJob
metadata:
  name: security-scanner
  namespace: default
spec:
  # Run daily at 2 AM UTC
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid  # Don't run concurrent scans
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: security-scanner
        spec:
          serviceAccountName: security-scanner
          restartPolicy: OnFailure
          containers:
          - name: scanner
            image: iad.ocir.io/your-namespace/oke-security-scanner:latest
            imagePullPolicy: Always
            resources:
              requests:
                memory: "512Mi"
                cpu: "500m"
              limits:
                memory: "2Gi"
                cpu: "2000m"
            env:
              # Trivy configuration
              - name: TRIVY_SEVERITY
                valueFrom:
                  secretKeyRef:
                    name: security-scanner-config
                    key: TRIVY_SEVERITY
              - name: TRIVY_TIMEOUT
                valueFrom:
                  secretKeyRef:
                    name: security-scanner-config
                    key: TRIVY_TIMEOUT

              # Scanning configuration
              - name: EXCLUDE_NAMESPACES
                valueFrom:
                  secretKeyRef:
                    name: security-scanner-config
                    key: EXCLUDE_NAMESPACES

              # Discord notifications (optional)
              # - name: DISCORD_WEBHOOK_URL
              #   valueFrom:
              #     secretKeyRef:
              #       name: security-scanner-config
              #       key: DISCORD_WEBHOOK_URL

              # OCIR cleanup (optional; see README for the full env-var reference)
              # - name: OCIR_CLEANUP_ENABLED
              #   value: "true"
              # - name: OCIR_CLEANUP_KEEP_COUNT
              #   value: "5"
            volumeMounts:
              - name: trivy-cache
                mountPath: /home/scanner/.cache/trivy
              # OCI SDK config (~/.oci/config) — needed for OCIR list/delete calls.
              - name: oci-config
                mountPath: /home/scanner/.oci
                readOnly: true
              # Docker config (~/.docker/config.json) — needed when resolving
              # multi-arch manifest lists in OCIR during orphan detection.
              - name: docker-config
                mountPath: /home/scanner/.docker
                readOnly: true
          volumes:
            - name: trivy-cache
              emptyDir: {}
            - name: oci-config
              secret:
                secretName: security-scanner-oci-config
                # Secret must contain keys `config` and `oci_api_key.pem`
                defaultMode: 0400
            - name: docker-config
              secret:
                secretName: security-scanner-docker-config
                # Secret must contain key `config.json`
                items:
                  - key: config.json
                    path: config.json
                    mode: 0400
