# Example Kubernetes Secrets for the security scanner.
# Copy this file, fill in values, and apply. DO NOT commit real secrets to git!
#
# The CronJob references three Secrets:
#   1. security-scanner-config        — scalar env-var overrides (TRIVY_*, EXCLUDE_NAMESPACES, etc.)
#   2. security-scanner-oci-config    — ~/.oci/config + API key (for OCIR list/delete via OCI SDK)
#   3. security-scanner-docker-config — ~/.docker/config.json (for Docker V2 manifest fetches during
#                                       orphan-manifest detection; only needed if OCIR cleanup is enabled)

---
apiVersion: v1
kind: Secret
metadata:
  name: security-scanner-config
  namespace: default
type: Opaque
stringData:
  TRIVY_SEVERITY: "CRITICAL,HIGH"
  TRIVY_TIMEOUT: "300"
  EXCLUDE_NAMESPACES: "kube-system,kube-public,kube-node-lease"
  # SCAN_NAMESPACES: "default,production"          # Optional: only scan these namespaces
  # DISCORD_WEBHOOK_URL: "https://discord.com/..." # Optional: enable Discord reports

---
apiVersion: v1
kind: Secret
metadata:
  name: security-scanner-oci-config
  namespace: default
type: Opaque
stringData:
  # Mounted into the container at /home/scanner/.oci/config
  # `key_file` must point at the in-container path of oci_api_key.pem (same directory).
  config: |
    [DEFAULT]
    user=ocid1.user.oc1..your-user-ocid
    fingerprint=your:fingerprint:here
    tenancy=ocid1.tenancy.oc1..your-tenancy-ocid
    region=us-ashburn-1
    key_file=/home/scanner/.oci/oci_api_key.pem
  oci_api_key.pem: |
    -----BEGIN PRIVATE KEY-----
    ...your private key here...
    -----END PRIVATE KEY-----

---
apiVersion: v1
kind: Secret
metadata:
  name: security-scanner-docker-config
  namespace: default
type: Opaque
stringData:
  # Mounted into the container at /home/scanner/.docker/config.json
  config.json: |
    {
      "auths": {
        "iad.ocir.io": {
          "auth": "BASE64(tenancy/username:auth-token)"
        }
      }
    }
