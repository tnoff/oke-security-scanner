[tox]
envlist = py311,py312,py313,py314

[testenv]
extras = dev
commands =
    pytest tests/ -v --cov=src --cov-report=term-missing
    pylint src/
    bandit -r src/

[testenv:pylint]
extras = dev
commands = pylint src/

[testenv:pytest]
extras = dev
commands = pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=html

[testenv:bandit]
extras = dev
commands = bandit -r src/
